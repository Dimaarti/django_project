{% extends "base.html"%}

{% block content%}
{% load crispy_forms_tags %}

<p>
<h3>Создание вложения</h3>
</p>

<form enctype="multipart/form-data" action="{% url 'create_attachments' %}" method="POST">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-outline-secondary">Добавить файл</button>
</form>


{% endblock %}
