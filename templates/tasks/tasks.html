{% extends "base.html" %}

{% block content %}
<style>
    .table-emerald thead {
        background-color: #808080;
        color: white;
    }

    .table-emerald tbody tr:hover {
        background-color: #808080;
    }

    .table-emerald td:hover,
    .table-emerald th:hover {
        background-color: #C0C0C0;
    }

    .table-emerald td,
    .table-emerald th {
        transition: background-color 0.1s;
    }
</style>


<style>
    table {
      border-collapse: collapse;
      width: 100%;
    }
    table, th, td {
      border: 1px solid silver;
    }
    th, td {
      padding: 10px;
      text-align: center;
    }
</style>

<div class="container mt-4" style="max-width: 1000px;">
    <table class="table table-striped table-hover table-emerald" border="2">
        <thead>
        <tr>
            <th scope="col">Task name</th>
            <th scope="col">Status</th>
            <th scope="col">Priority</th>
        </tr>

        </thead>
        <tbody>
        {% for tasks in tasks %}
        <tr>
            <td>{{tasks.task_name}}</td>
            <td>{{tasks.status}}</td>
            <td>{{tasks.priority}}</td>
        </tr>
        {% endfor %}

        </tbody>
    </table>
</div>

{% endblock %}
